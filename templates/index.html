{% extends "base.html" %}
{% block content %}
<div style="text-align: center; padding: 50px 0;">
    <h1 style="font-size: 3.5rem; margin: 0;">MEME ECONOMY</h1>
</div>

<div class="market-grid">
    {% for m in memes %}
    <div class="meme-card">
        <div style="font-size: 0.8rem; text-align: right; margin-bottom: 10px; color: var(--stonks-green);">▲ TRADING HIGH</div>
        <img src="{{ m.url }}">
        <h3 style="margin: 15px 0 5px 0;">{{ m.name }}</h3>
        <div class="price">${{ m.price }}</div>
        <a href="{{ url_for('trade', meme_id=m.id, name=m.name) }}" class="buy-btn">INVEST</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
